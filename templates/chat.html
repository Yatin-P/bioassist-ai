<!DOCTYPE html>
<html>
<head>
    <title>BioAssist AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 600px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            color: blue;
        }

        .bot {
            color: green;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: black;
            color: white;
            border: none;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🧠 BioAssist AI</h1>

    <div id="chat-box"></div>

    <input type="text" id="question" placeholder="Ask a medical question...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("question");
    let chatBox = document.getElementById("chat-box");

    let question = input.value;

    chatBox.innerHTML += `<p class="user"><b>You:</b> ${question}</p>`;

    fetch("/get", {
        method: "POST",
        body: JSON.stringify({msg: question}),
        headers: {"Content-Type": "application/json"}
    })
    .then(res => res.json())
    .then(data => {
        chatBox.innerHTML += `<p class="bot"><b>Bot:</b> ${data.response}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    input.value = "";
}
</script>

</body>
</html>
